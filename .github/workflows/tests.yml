name: Playwright BDD Tests

on:
  push:
    branches: [ master, main, chore/bdd-structure-refactor ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Install Playwright browsers and system dependencies
        run: |
          playwright install --with-deps chromium
        env:
          PLAYWRIGHT_DOWNLOAD_HOST: https://playwright.azureedge.net

      - name: Run tests with pytest
        run: |
          pytest tests/test_e2e.py \
            --cucumberjson=reports/cucumber.json \
            --html=reports/report.html \
            --disable-warnings \
            -v

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/
          retention-days: 30

      - name: Upload test evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-evidence-${{ matrix.python-version }}
          path: evidence/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'reports/report.html';
            if (fs.existsSync(reportPath)) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Test report available in artifacts'
              });
            }
