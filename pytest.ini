[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers -ra

markers =
    smoke: Smoke tests - quick sanity checks
    regression: Regression tests - comprehensive feature testing
    slow: Slow running tests
    login: Login feature tests
    inventory: Inventory feature tests
    checkout: Checkout feature tests
    e2e: End-to-end tests
